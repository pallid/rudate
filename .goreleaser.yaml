before:
  hooks:
    - go mod tidy

builds:
  - id: rudate
    dir: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - v7
    ignore:
      - goarch: arm64
        goos: windows
    flags:
      - -trimpath

archives:
  - id: rudate
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - "!tests"
      - "!testdata"
      - "!**/*.go"

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  disable: true

release:
  github:
    owner: pallid
    name: rudate